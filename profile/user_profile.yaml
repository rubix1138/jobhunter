summary: |
  Cybersecurity executive with 31+ years of progressive experience spanning hands-on engineering,
  consulting, entrepreneurship, and executive leadership. Currently SVP of Security Operations and
  Technology at Truist (6th largest US bank), leading hundreds of engineers across incident response,
  security engineering, network security, and cyber operations. Built and scaled multiple security
  programs from scratch, including a 24/5 Cyber Incident Response Team, a Production Support Center
  of Excellence serving 300+ engineers, and a full insourcing of cyber technology from a managed
  security provider.

  Career arc progresses from network administration and systems engineering through IBM global
  consulting, security startup leadership, CISO roles, and Fortune 500 executive management.
  Deep expertise in security operations, zero-trust architecture, segmentation, cloud security,
  DevSecOps, and IT hygiene. Published author of IBM Redbooks and a Gartner segmentation playbook.
  Prolific speaker at DefCon, BSides, DragonCon (EFF track), BlackHat, RSA, Splunk .conf, and
  DoD Cyber Crime Conference. Active in the security community as Chair of TAG Information Security
  Society and advisor to security startups. Holds CISSP, CISM, and numerous technical certifications.

