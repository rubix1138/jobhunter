    "Why do you want to work here": |
      With over three decades in cybersecurity — from hands-on engineering through CISO and SVP roles
      at a top-6 US bank — I bring the rare combination of executive leadership and deep technical
      capability. I'm drawn to organizations tackling meaningful security challenges where I can build
      teams, shape strategy, and stay close to the technology. My track record of building security
      programs from scratch and leading through major transformations aligns well with organizations
      in growth or transition.
    "Describe a challenging project": |
      At Truist, I was hired to build a Cyber Incident Response Team from zero. Within 5 months,
      I stood up a full 24/5 CIRT with all supporting processes and technology. This expanded into
      leading the insourcing of all cyber technology from a managed security provider to 100% in-house
      operations, then creating a Production Support Center of Excellence supporting 300+ engineers.
      This effort earned me the Truist Performance Award, recognizing the top 1% of the company.
    "What is your leadership style": |
      I lead from the front — technically engaged but focused on enabling my teams. I've built
      organizations from single-digit startups to 300+ person enterprise teams. I believe in
      clear communication across all levels (board to SOC analyst), investing in people through
      mentorship, and creating processes that scale. My career spanning vendor, consulting,
      startup, and enterprise gives me empathy for every stakeholder in the security ecosystem.
    "Tell us about your security philosophy": |
      Security must be driven by business risk, not technology for its own sake. I've built programs
      around zero-trust principles, defense-in-depth, and operational excellence. Whether implementing
      microsegmentation at a startup or running SOC operations for a major bank, the fundamentals are
      the same: know your assets, understand your threats, detect and respond quickly, and continuously
      improve. I'm also a strong advocate for the security community — sharing knowledge through
      speaking, publishing, and mentoring is how we all get better.
