name: Dependency Scan

on:
  push:
  pull_request:
  schedule:
    - cron: '0 7 * * 1'

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        # Do not set python-version here — it triggers auto-venv activation
        # which fails when the workflow has no project venv yet. Let `uv` pick
        # a Python for each subsequent command; `uv export` and `uvx pip-audit`
        # both run against any managed Python.

      - name: Export locked requirements
        run: uv export --no-hashes --no-header --frozen --no-emit-project > /tmp/requirements.txt

      - name: Run pip-audit
        run: uvx pip-audit --requirement /tmp/requirements.txt
        # Exits non-zero if any locked dependency has a known CVE.
        # Fix: run 'uv lock --upgrade-package <pkg>' and update uv.lock.
