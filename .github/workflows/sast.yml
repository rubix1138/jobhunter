name: SAST

on:
  push:
  pull_request:

jobs:
  # ── Bandit: Python AST-based security checks ────────────────────────────────
  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install "bandit[toml]==1.8.3"

      - name: Run Bandit
        run: |
          bandit -r src/ -c bandit.toml \
            --severity-level medium \
            --confidence-level medium

  # ── Semgrep: pattern-based OWASP Top 10 analysis ───────────────────────────
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep \
            --config=p/python \
            --config=p/owasp-top-ten \
            --error \
            src/

  # ── CodeQL: semantic dataflow / taint analysis ──────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        # Results appear in GitHub → Security → Code scanning alerts
