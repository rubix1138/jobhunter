name: SBOM

on: [push, pull_request]

permissions:
  contents: read

jobs:
  sbom:
    name: Generate SBOM and Scan (Syft + Grype)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install project dependencies
        run: pip install -e ".[dev]"
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: spdx-json
          output-file: sbom.json
          upload-artifact: true
          artifact-name: sbom-${{ github.sha }}
      - name: Scan SBOM with Grype
        uses: anchore/scan-action@3343887d815d7b07465f6fdcd395bd66508d486a # v3
        env:
          # anchore/scan-action@v3 bundles a grype version whose 5-day DB
          # freshness check rejects the action's cached DB when it drifts
          # out of spec. Tolerate up to 30 days so scans don't fail for
          # reasons unrelated to the repo's own dependencies.
          GRYPE_DB_MAX_ALLOWED_BUILT_AGE: 4320h
        with:
          sbom: sbom.json
          fail-build: true
          severity-cutoff: high
