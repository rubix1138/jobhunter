name: Threat Model Check

on: [push, pull_request]

permissions:
  contents: read

jobs:
  threat-model-check:
    name: Validate threat model artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check threat-models directory exists
        run: |
          if [[ ! -d "threat-models" ]]; then
            echo "ERROR: threat-models/ directory not found."
            echo ""
            echo "Threat modeling is a required design-time activity."
            echo "Run the following to create threat model artifacts:"
            echo "  stride-gpt identify threat-models/<project>-description.md"
            echo "  Open threat-models/<project>.json in OWASP Threat Dragon"
            echo ""
            echo "See: threat-models/README.md"
            exit 1
          fi
          echo "OK: threat-models/ directory found"

      - name: Validate threat model JSON files
        run: |
          shopt -s nullglob
          files=(threat-models/*.json)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "ERROR: No *.json threat model files found in threat-models/"
            echo ""
            echo "Create a Threat Dragon model and save it as threat-models/<project>.json"
            exit 1
          fi
          echo "Found ${#files[@]} threat model file(s)"
          echo ""
          for f in "${files[@]}"; do
            if ! python3 -m json.tool "$f" > /dev/null; then
              echo "INVALID JSON: $f" >&2
              exit 1
            fi
            title=$(jq -r '.summary.title // "(no title)"' "$f")
            diagrams=$(jq '(.detail.diagrams // []) | length' "$f")
            threats=$(jq '[.detail.diagrams[]?.cells[]?.threats[]?] | length' "$f")
            echo "OK: $f — title=\"$title\" diagrams=$diagrams threats=$threats"
          done
          echo ""
          echo "All threat model files are valid JSON."
